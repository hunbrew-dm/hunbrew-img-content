<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karakterlap</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151a22;
            --border: #2a3341;
            --accent: #00e5ff;
            --accent-dim: rgba(0, 229, 255, 0.15);
            --gold: #d4af37;
            --hp-red: #ff4d4d;
            --hp-green: #40ffaa;
            --hp-blue: #44aaff;
            --text: #e0e0e0;
            --font-display: 'Noto Serif', serif;
            --font-num: 'Noto Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Noto Sans', sans-serif; padding: 20px; }

        .dashboard { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .dashboard { grid-template-columns: 180px 1fr 320px; align-items: start; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .card-title { font-family: var(--font-display); color: var(--gold); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .card-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .clickable-roll { cursor: pointer; transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease; }
        .clickable-roll:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-dim), 0 0 18px rgba(0,229,255,0.14); transform: translateY(-1px); }
        .clickable-roll:active { transform: translateY(0); }
        .hit-dice-row { width: 100%; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 2px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .hit-dice-trigger { display: flex; align-items: center; gap: 8px; border: 1px solid transparent; padding: 4px 8px; border-radius: 8px; }
        .hit-dice-label { font-family: var(--font-display); font-size: 0.72rem; text-transform: uppercase; color: var(--gold); }
        .hit-dice-meta { font-family: var(--font-num); font-size: 0.75rem; color: var(--accent); white-space: nowrap; }
        .hit-dice-track { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .roller-fab {
            position: fixed; left: 18px; bottom: 18px; z-index: 260;
            width: 58px; height: 58px; border-radius: 50%; border: 1px solid var(--accent);
            background: radial-gradient(circle at 30% 30%, rgba(0,229,255,0.28), rgba(11,14,20,0.96));
            color: white; cursor: pointer; box-shadow: 0 16px 32px rgba(0,0,0,0.45), 0 0 24px rgba(0,229,255,0.18);
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .roller-overlay {
            position: fixed; inset: 0; z-index: 270; background: rgba(2,4,8,0.62); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .roller-overlay[hidden] { display: none; }
        .roller-panel {
            width: min(420px, calc(100vw - 40px));
            background: rgba(21,26,34,0.98); border: 1px solid var(--accent); border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.45), 0 0 30px rgba(0,229,255,0.12);
            overflow: hidden;
        }
        .roller-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, rgba(0,229,255,0.08), rgba(0,0,0,0)); }
        .roller-title { font-family: var(--font-display); font-size: 0.8rem; color: var(--gold); text-transform: uppercase; }
        .roller-head-actions { display: flex; align-items: center; gap: 8px; }
        .roller-clear, .roller-close { border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text); border-radius: 8px; padding: 4px 8px; cursor: pointer; }
        .roller-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
        .quick-rolls { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 4px; }
        .quick-roll-btn {
            border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text);
            border-radius: 999px; padding: 6px 10px; cursor: pointer; font-size: 0.72rem; min-width: 52px;
        }
        .quick-roll-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 14px rgba(0,229,255,0.12); }
        .roller-empty { color: #9aa7b1; font-size: 0.82rem; line-height: 1.4; }
        .roller-result { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
        .roller-label { font-size: 0.78rem; color: #b9c3cb; }
        .roller-formula { font-family: var(--font-num); font-size: 0.8rem; color: var(--accent); }
        .roller-total { font-family: var(--font-num); font-size: 2.4rem; color: white; text-align: right; line-height: 1; text-shadow: 0 0 18px rgba(255,255,255,0.18); }
        .roller-badge { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 999px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .roller-badge.crit { background: rgba(64,255,170,0.14); color: var(--hp-green); border: 1px solid rgba(64,255,170,0.4); }
        .roller-badge.fail { background: rgba(255,77,77,0.14); color: var(--hp-red); border: 1px solid rgba(255,77,77,0.4); }
        .roller-breakdown { font-size: 0.8rem; color: #c2ccd4; line-height: 1.45; }
        .roller-history { display: flex; flex-wrap: wrap; gap: 8px; }
        .roller-chip { border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text); border-radius: 999px; padding: 6px 10px; cursor: pointer; font-size: 0.72rem; }
        .roller-chip strong { color: var(--accent); font-family: var(--font-num); margin-left: 4px; }
        .last-roll-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 280;
            width: min(420px, calc(100vw - 40px)); background: rgba(21,26,34,0.98); border: 1px solid var(--accent);
            border-radius: 18px; box-shadow: 0 24px 44px rgba(0,0,0,0.48), 0 0 26px rgba(0,229,255,0.14);
            padding: 18px; backdrop-filter: blur(12px);
        }
        .last-roll-modal[hidden] { display: none; }
        .last-roll-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
        .last-roll-title { font-family: var(--font-display); font-size: 0.82rem; color: var(--gold); text-transform: uppercase; }
        .last-roll-close { border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text); border-radius: 8px; padding: 4px 8px; cursor: pointer; }
        .last-roll-formula { font-family: var(--font-num); color: var(--accent); font-size: 0.84rem; }
        .last-roll-total { font-family: var(--font-num); color: white; font-size: 3rem; line-height: 1; text-align: right; }
        .last-roll-breakdown { margin-top: 10px; color: #c2ccd4; font-size: 0.82rem; line-height: 1.45; }

        /* --- ENHANCED HP TRACKER v6 --- */
        .hp-main-display {
            display: flex; align-items: flex-end; justify-content: center; gap: 5px; margin-bottom: 20px; position: relative;
        }

        /* The main large number you edit */
        .hp-current-input {
            font-family: var(--font-num); font-size: 5.5rem; /* Massive size */
            color: white; background: transparent; border: none; width: 160px; text-align: right;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .hp-current-input:focus { outline: none; border-bottom: 2px solid var(--accent); }

        /* The max value, now clearly legible */
        .hp-max-display {
            font-family: var(--font-num); font-size: 2.2rem; /* Clearly legible */
            color: #607d8b; /* Blue-grey for contrast */
            padding-bottom: 12px; /* Align with bottom of input */
        }

        /* Stylized Temporary HP Badge */
        .temp-hp-badge {
            position: absolute; top: 0; right: 20px;
            background-color: #0d2a45; border: 1px solid var(--hp-blue); color: var(--hp-blue);
            font-family: var(--font-num); font-size: 1.1rem; font-weight: bold;
            padding: 4px 12px; border-radius: 4px; box-shadow: 0 0 10px var(--hp-blue);
            opacity: 0; transform: translateY(-10px); transition: 0.3s;
        }
        .temp-hp-badge.active { opacity: 1; transform: translateY(0); }

        .hp-controls { display: flex; flex-direction: column; gap: 10px; align-items: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
        .mod-input-wrap { display: flex; align-items: center; gap: 10px; }
        .mod-stepper { display: flex; align-items: stretch; gap: 6px; }
        .mod-step-btn {
            width: 34px; min-width: 34px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--accent);
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 1rem;
            line-height: 1;
        }
        .mod-step-btn:hover { background: rgba(0,229,255,0.15); border-color: var(--accent); }
        .mod-input {
            background: var(--bg); border: 1px solid var(--border); color: var(--accent);
            font-family: var(--font-num); font-size: 1.5rem; width: 80px; text-align: center;
            padding: 5px; border-radius: 4px;
        }

        .btn-group { display: flex; gap: 8px; width: 100%; justify-content: center; }
        .hp-btn {
            flex: 1; padding: 10px 5px; border: none; border-radius: 4px;
            font-family: var(--font-display); font-size: 0.7rem; cursor: pointer;
            transition: 0.2s; text-transform: uppercase; color: white;
        }
        .btn-dmg { background: #551111; border: 1px solid var(--hp-red); }
        .btn-dmg:hover { background: var(--hp-red); }
        .btn-heal { background: #114422; border: 1px solid var(--hp-green); }
        .btn-heal:hover { background: var(--hp-green); color: black; }
        .btn-temp { background: #113355; border: 1px solid var(--hp-blue); }
        .btn-temp:hover { background: var(--hp-blue); }
        .death-save-block { width: 100%; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
        .death-save-title { font-family: var(--font-display); font-size: 0.7rem; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
        .death-save-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .death-save-label { font-size: 0.7rem; text-transform: uppercase; color: #aaa; min-width: 72px; }
        .death-save-tracks { display: flex; gap: 6px; }
        .death-save-dot {
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid var(--border); background: transparent; cursor: pointer;
        }
        .death-save-dot.success.filled { background: var(--hp-green); border-color: var(--hp-green); box-shadow: 0 0 8px var(--hp-green); }
        .death-save-dot.fail.filled { background: var(--hp-red); border-color: var(--hp-red); box-shadow: 0 0 8px var(--hp-red); }
        .death-save-block[hidden] { display: none; }

        /* --- STATS, SKILLS, BUBBLES --- */
        header { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: space-between; align-items: flex-end; } }
        .vitals-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); position: sticky; top: 10px; z-index: 100; }
        @media (min-width: 1024px) { .vitals-bar { position: static; } }
        .vital-val { font-family: var(--font-num); font-size: 1.4rem; color: var(--accent); text-align: center; }
        .stats-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        @media (min-width: 1024px) { .stats-list { grid-template-columns: 1fr; } }
        .stat-box {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 8px; text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 2px;
            min-height: 92px;
        }
        .stat-name { font-family: var(--font-display); font-size: 0.75rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.04em; }
        .stat-mod { font-family: var(--font-num); font-size: 2.1rem; color: var(--accent); display: block; line-height: 1; }
        .stat-score { font-family: var(--font-num); font-size: 0.9rem; color: #cfd8dc; line-height: 1; }
        .skills-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        @media (min-width: 600px) { .skills-grid { grid-template-columns: 1fr 1fr; } }
        .skill-item, .save-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; padding: 4px 8px; background: rgba(255,255,255,0.02); }
        .skill-left { display: flex; align-items: center; gap: 8px; }
        .skill-rank {
            min-width: 28px; padding: 2px 5px; border-radius: 999px; font-size: 0.58rem; text-align: center;
            border: 1px solid var(--border); color: #bbb; letter-spacing: 0.02em;
        }
        .skill-rank.rank-half { border-style: dashed; color: var(--accent); }
        .skill-rank.rank-full { background: rgba(0,229,255,0.12); border-color: var(--accent); color: var(--accent); }
        .skill-rank.rank-expert { background: rgba(212,175,55,0.16); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 0 1px rgba(212,175,55,0.3) inset; }
        .prof-dot { width: 6px; height: 6px; border: 1px solid var(--accent); border-radius: 50%; margin-right: 8px; }
        .prof-dot.filled { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .bubble { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; margin-left: 4px; }
        .bubble.checked { background: var(--accent); border-color: var(--accent); }
        .feature-list { display: flex; flex-direction: column; gap: 12px; }
        .feature-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .feature-title { font-family: var(--font-display); font-size: 0.78rem; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
        .feature-desc { font-size: 0.8rem; color: #aaa; white-space: pre-line; }
        .feature-counter { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 8px; }
        .feature-counter-label { font-size: 0.65rem; text-transform: uppercase; color: #888; }
        .attack-roll-btn, .attack-dmg-btn {
            width: 100%; text-align: left; border: 1px solid transparent; background: rgba(255,255,255,0.02); color: inherit;
            border-radius: 8px; padding: 8px 10px; cursor: pointer;
        }
        .attack-dmg-btn { text-align: center; color: var(--accent); font-family: var(--font-num); }
        .attack-roll-btn strong { color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rest-actions { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .rest-actions { grid-template-columns: 1fr; } }
        .rest-btn { background: linear-gradient(to right, #800, #400); color: white; border: none; padding: 15px; border-radius: 8px; font-family: var(--font-display); cursor: pointer; }
        .short-rest-btn { background: linear-gradient(to right, #0d4d5c, #08313b); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="char-title"><h1 id="c-name">Név</h1><p id="c-meta" style="color:var(--gold)">Kaszt</p></div>
        <div class="vitals-bar">
            <div class="vital-item"><div style="font-size:0.6rem; text-align:center">Védettségi Fok</div><div class="vital-val" id="c-ac">10</div></div>
            <div class="vital-item"><div style="font-size:0.6rem; text-align:center">Kezdeményezés</div><div class="vital-val" id="c-init">+0</div></div>
            <div class="vital-item"><div style="font-size:0.6rem; text-align:center">Jártassági bónusz</div><div class="vital-val" id="c-prof">+2</div></div>
        </div>
    </header>

    <aside class="stats-list" id="stat-container"></aside>

    <main>
        <div class="card">
                <div class="card-title card-title-row"><span>Harcerőpont</span></div>
            <div class="hp-main-display">
                <div id="hp-temp-badge" class="temp-hp-badge"></div>
                <input type="number" id="hp-curr" class="hp-current-input" value="0" min="0" step="1" inputmode="numeric" oninput="normalizeCurrentHP(this)" onchange="save(); updateDeathSaveUI();">
                <div class="hp-max-display">/ <span id="hp-max">0</span></div>
            </div>

            <div class="hp-controls">
                <div class="mod-input-wrap">
                    <span style="font-size: 0.7rem; text-transform: uppercase;">Mennyiség</span>
                    <div class="mod-stepper">
                        <button type="button" class="mod-step-btn" aria-label="Mennyiség csökkentése" onclick="stepHPMod(-1)">−</button>
                        <input type="number" id="hp-mod" class="mod-input" value="1" min="1" step="1" inputmode="numeric" oninput="normalizeHPMod(this)" onblur="normalizeHPMod(this)">
                        <button type="button" class="mod-step-btn" aria-label="Mennyiség növelése" onclick="stepHPMod(1)">+</button>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="hp-btn btn-dmg" onclick="adjustHP('dmg')">Sebzés</button>
                    <button class="hp-btn btn-heal" onclick="adjustHP('heal')">Gyógyítás</button>
                    <button class="hp-btn btn-temp" onclick="adjustHP('temp')">Ideiglenes</button>
                </div>
                <div id="hit-dice-row" class="hit-dice-row"></div>
                <div id="death-save-block" class="death-save-block" hidden>
                    <div class="death-save-title">Halálsikerek</div>
                    <div class="death-save-row">
                        <span class="death-save-label">Siker</span>
                        <div class="death-save-tracks">
                            <button type="button" class="death-save-dot success" data-kind="success" data-index="0" onclick="toggleDeathSave('success', 0)"></button>
                            <button type="button" class="death-save-dot success" data-kind="success" data-index="1" onclick="toggleDeathSave('success', 1)"></button>
                            <button type="button" class="death-save-dot success" data-kind="success" data-index="2" onclick="toggleDeathSave('success', 2)"></button>
                        </div>
                    </div>
                    <div class="death-save-row" style="margin-bottom:0;">
                        <span class="death-save-label">Kudarc</span>
                        <div class="death-save-tracks">
                            <button type="button" class="death-save-dot fail" data-kind="fail" data-index="0" onclick="toggleDeathSave('fail', 0)"></button>
                            <button type="button" class="death-save-dot fail" data-kind="fail" data-index="1" onclick="toggleDeathSave('fail', 1)"></button>
                            <button type="button" class="death-save-dot fail" data-kind="fail" data-index="2" onclick="toggleDeathSave('fail', 2)"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Képességek</div>
            <div class="skills-grid" id="skills-container"></div>
        </div>

        <div class="card">
            <div class="card-title">Mentődobások</div>
            <div class="skills-grid" id="saves-container"></div>
        </div>

        <div class="card">
            <div class="card-title">Támadások</div>
            <table id="atk-table"><tbody></tbody></table>
        </div>
    </main>

    <section>
        <div class="card"><div class="card-title">Erőforrások</div><div id="slot-container"></div></div>
        <div class="card"><div class="card-title">Tulajdonságok</div><div id="feat-list" class="feature-list"></div></div>
    </section>

    <div class="rest-actions">
        <button class="rest-btn short-rest-btn" onclick="shortRest()">🌙 Rövid Pihenő</button>
        <button class="rest-btn" onclick="longRest()">🔥 Hosszú Pihenő</button>
    </div>
</div>

<button type="button" id="roller-fab" class="roller-fab" aria-label="Dobáspanel megnyitása" onclick="openRollerModal()">
    🎲
</button>

<div id="roller-overlay" class="roller-overlay" hidden>
    <aside id="roller-panel" class="roller-panel" aria-live="polite" aria-label="Dobáspanel">
        <div class="roller-head">
            <div class="roller-title">Misztikus Dobás</div>
            <div class="roller-head-actions">
                <button type="button" class="roller-clear" onclick="clearRollHistory()">Törlés</button>
                <button type="button" class="roller-close" onclick="closeRollerModal()">Bezár</button>
            </div>
        </div>
        <div class="roller-body">
            <div class="quick-rolls">
                <button type="button" class="quick-roll-btn" onclick="rollQuickDie(4)">d4</button>
                <button type="button" class="quick-roll-btn" onclick="rollQuickDie(6)">d6</button>
                <button type="button" class="quick-roll-btn" onclick="rollQuickDie(8)">d8</button>
                <button type="button" class="quick-roll-btn" onclick="rollQuickDie(10)">d10</button>
                <button type="button" class="quick-roll-btn" onclick="rollQuickDie(12)">d12</button>
                <button type="button" class="quick-roll-btn" onclick="rollQuickDie(20)">d20</button>
            </div>
            <div id="roller-empty" class="roller-empty">Kattints egy képességre, mentődobásra, támadásra vagy harcerő kockára a dobáshoz.</div>
            <div id="roller-current" hidden>
                <div class="roller-result">
                    <div>
                        <div id="roller-label" class="roller-label"></div>
                        <div id="roller-formula" class="roller-formula"></div>
                        <div id="roller-badge"></div>
                    </div>
                    <div id="roller-total" class="roller-total"></div>
                </div>
                <div id="roller-breakdown" class="roller-breakdown"></div>
            </div>
            <div id="roller-history" class="roller-history"></div>
        </div>
    </aside>
</div>

<div id="last-roll-modal" class="last-roll-modal" hidden>
    <div class="last-roll-top">
        <div>
            <div class="last-roll-title">Utolsó dobás</div>
            <div id="last-roll-label" class="roller-label"></div>
            <div id="last-roll-formula" class="last-roll-formula"></div>
            <div id="last-roll-badge"></div>
        </div>
        <div>
            <button type="button" class="last-roll-close" onclick="hideLastRollModal()">Bezár</button>
            <div id="last-roll-total" class="last-roll-total"></div>
        </div>
    </div>
    <div id="last-roll-breakdown" class="last-roll-breakdown"></div>
</div>

<script>
    const sheetData = {
        id: "valerius_v6",
        name: "Valerius Kínzott",
        raceClass: "Tiefling | Boszorkánymester 5",
        ac: 16, init: "+3", prof: "+3", hpMax: 42, hitDice: { total: 5, die: "d8" },
        stats: [
            { label: "ERŐ", val: 10, mod: "+0" }, { label: "ÜGYESSÉG", val: 16, mod: "+3" },
            { label: "ÁLLÓKÉPESSÉG", val: 14, mod: "+2" }, { label: "INTELLIGENCIA", val: 12, mod: "+1" },
            { label: "BÖLCSESSÉG", val: 8,  mod: "-1" }, { label: "KARIZMA", val: 18, mod: "+4" }
        ],
        savingThrows: [
            { statIndex: 0, p: false },
            { statIndex: 1, p: false },
            { statIndex: 2, p: false },
            { statIndex: 3, p: false },
            { statIndex: 4, p: true },
            { statIndex: 5, p: true }
        ],
        skills: [
            { n: "Akrobatika", a: "ÜGY", statIndex: 1, s: 1, p: false },
            { n: "Atlétika", a: "ERŐ", statIndex: 0, s: 0.5, p: false },
            { n: "Előadásmód", a: "KAR", statIndex: 5, s: 2, p: false },
            { n: "Ember ismeret", a: "BÖL", statIndex: 4, s: 1, p: true },
            { n: "Észlelés", a: "BÖL", statIndex: 4, s: 0, p: false },
            { n: "Kézügyesség", a: "ÜGY", statIndex: 1, s: 1, p: false },
            { n: "Lopakodás", a: "ÜGY", statIndex: 1, s: 1, p: false },
            { n: "Mágia ismeret", a: "INT", statIndex: 3, s: 1, p: true },
            { n: "Megfélemlítés", a: "KAR", statIndex: 5, s: 2, p: true },
            { n: "Meggyőzés", a: "KAR", statIndex: 5, s: 1, p: true },
            { n: "Megtévesztés", a: "KAR", statIndex: 5, s: 1, p: true },
            { n: "Orvoslás", a: "BÖL", statIndex: 4, s: 0, p: false },
            { n: "Szelídítés", a: "BÖL", statIndex: 4, s: 0.5, p: false },
            { n: "Természetismeret", a: "INT", statIndex: 3, s: 0, p: false },
            { n: "Történelem", a: "INT", statIndex: 3, s: 0, p: false },
            { n: "Túlélés", a: "BÖL", statIndex: 4, s: 0.5, p: false },
            { n: "Vallás", a: "INT", statIndex: 3, s: 0, p: false },
            { n: "Vizsgálódás", a: "INT", statIndex: 3, s: 1, p: true }
        ],
        attacks: [
            { n: "Misztikus Sugár", b: "+7", d: "2d10 [F]" },
            { n: "Tőr", b: "+6", d: "1d4+3 [P]" }
        ],
        resources: [
            { label: "Varázslat rekesz", count: 2, shortRest: 2 },
            { label: "Inspiráció", count: 1, shortRest: 0 }
        ],
        features: [
            { title: "Sötét Úr Áldása", description: "Szerezz 9 ideiglenes ÉP-t, amikor egy ellenséges lényt 0 ÉP-re viszel." },
            { title: "Gyötrő Sugár", description: "+4 sebzés a Misztikus Sugárhoz." },
            { title: "Sötétlátás", description: "Lásd a sötétséget 18 méterig." },
            { title: "Átokhasználatok", description: "Itt követheted az aktív átokhasználatokat.", count: 3, shortRest: 2 }
        ]
    };

    let tempHP = 0;
    let deathSaves = { success: [false, false, false], fail: [false, false, false] };
    let featureCounters = [];
    let hitDiceSpent = [];
    let rollHistory = [];
    let lastRollTimer = null;
    const KEY = `dnd_v6_${sheetData.id}`;

    function parseSigned(value) {
        return parseInt(String(value).replace('+', ''), 10) || 0;
    }

    function fmtSigned(value) {
        return value >= 0 ? `+${value}` : `${value}`;
    }

    function cleanRollFormula(formula) {
        return String(formula || '')
            .replace(/\[[^\]]*]/g, '')
            .replace(/\s+/g, '')
            .replace(/−/g, '-');
    }

    function buildD20Formula(modifier) {
        const value = parseSigned(modifier);
        return value === 0 ? '1d20' : `1d20${value > 0 ? '+' : ''}${value}`;
    }

    function getHitDiceFormula() {
        const die = sheetData.hitDice?.die || 'd8';
        const conMod = parseSigned(sheetData.stats[2]?.mod || 0);
        const dieFormula = die.startsWith('d') ? `1${die}` : die;
        return conMod === 0 ? dieFormula : `${dieFormula}${conMod > 0 ? '+' : ''}${conMod}`;
    }

    function skillRankLabel(rank) {
        if (rank === 0.5) return '½';
        if (rank === 2) return '×2';
        if (rank === 1) return 'JÁR';
        return '—';
    }

    function skillRankClass(rank) {
        if (rank === 0.5) return 'rank-half';
        if (rank === 2) return 'rank-expert';
        if (rank === 1) return 'rank-full';
        return 'rank-none';
    }

    function calcSkillBonus(skill) {
        const stat = sheetData.stats[skill.statIndex];
        const base = parseSigned(stat ? stat.mod : 0);
        const prof = parseSigned(sheetData.prof);
        let mult = 0;
        if (skill.s === 0.5) mult = 0.5;
        else if (skill.s === 1) mult = 1;
        else if (skill.s === 2) mult = 2;
        const bonus = base + Math.floor(prof * mult);
        return fmtSigned(bonus);
    }

    function rollFormula(formula) {
        const normalized = cleanRollFormula(formula);
        const tokens = normalized.match(/[+-]?[^+-]+/g) || [];
        let total = 0;
        let d20 = null;
        const parts = [];

        tokens.forEach(token => {
            const sign = token.startsWith('-') ? -1 : 1;
            const body = token.replace(/^[+-]/, '');

            if (/^\d*d\d+$/i.test(body)) {
                const [countRaw, sidesRaw] = body.toLowerCase().split('d');
                const count = parseInt(countRaw || '1', 10);
                const sides = parseInt(sidesRaw, 10);
                const rolls = Array.from({ length: count }, () => Math.floor(Math.random() * sides) + 1);
                const subtotal = rolls.reduce((sum, roll) => sum + roll, 0) * sign;
                if (count === 1 && sides === 20 && d20 === null) d20 = rolls[0];
                total += subtotal;
                parts.push(`${sign < 0 ? '-' : ''}${count}d${sides} [${rolls.join(', ')}]`);
                return;
            }

            if (/^\d+$/.test(body)) {
                const value = parseInt(body, 10) * sign;
                total += value;
                parts.push(`${value >= 0 ? '+' : ''}${value}`);
            }
        });

        return { total, normalized, parts, d20 };
    }

    function showRollResult(label, formula, options = {}) {
        const showLastModal = options.showLastModal !== false;
        const result = rollFormula(formula);
        const badge = result.d20 === 20
            ? { text: 'Természetes 20', className: 'crit' }
            : result.d20 === 1
                ? { text: 'Természetes 1', className: 'fail' }
                : null;

        document.getElementById('roller-empty').hidden = true;
        document.getElementById('roller-current').hidden = false;
        document.getElementById('roller-label').innerText = label;
        document.getElementById('roller-formula').innerText = result.normalized;
        document.getElementById('roller-total').innerText = result.total;
        document.getElementById('roller-breakdown').innerText = result.parts.join('  ');

        const badgeEl = document.getElementById('roller-badge');
        badgeEl.className = '';
        badgeEl.innerHTML = '';
        if (badge) {
            badgeEl.className = `roller-badge ${badge.className}`;
            badgeEl.innerText = badge.text;
        }

        rollHistory.unshift({ label, formula, total: result.total });
        rollHistory = rollHistory.slice(0, 8);
        renderRollHistory();
        if (showLastModal) {
            showLastRollModal(label, result.normalized, result.total, result.parts.join('  '), badge);
        }
    }

    function renderRollHistory() {
        const historyEl = document.getElementById('roller-history');
        historyEl.innerHTML = '';
        rollHistory.forEach((entry, index) => {
            historyEl.innerHTML += `<button type="button" class="roller-chip" onclick="rerollHistory(${index})">${entry.label}<strong>${entry.total}</strong></button>`;
        });
    }

    function rerollHistory(index) {
        const entry = rollHistory[index];
        if (entry) showRollResult(entry.label, entry.formula);
    }

    function clearRollHistory() {
        rollHistory = [];
        document.getElementById('roller-history').innerHTML = '';
        document.getElementById('roller-current').hidden = true;
        document.getElementById('roller-empty').hidden = false;
        document.getElementById('roller-badge').className = '';
        document.getElementById('roller-badge').innerHTML = '';
    }

    function rollQuickDie(sides) {
        showRollResult(`Gyors dobás d${sides}`, `1d${sides}`, { showLastModal: false });
    }

    function openRollerModal() {
        document.getElementById('roller-overlay').hidden = false;
    }

    function closeRollerModal() {
        document.getElementById('roller-overlay').hidden = true;
    }

    function hideLastRollModal() {
        document.getElementById('last-roll-modal').hidden = true;
        if (lastRollTimer) {
            clearTimeout(lastRollTimer);
            lastRollTimer = null;
        }
    }

    function showLastRollModal(label, formula, total, breakdown, badge) {
        document.getElementById('last-roll-label').innerText = label;
        document.getElementById('last-roll-formula').innerText = formula;
        document.getElementById('last-roll-total').innerText = total;
        document.getElementById('last-roll-breakdown').innerText = breakdown;

        const badgeEl = document.getElementById('last-roll-badge');
        badgeEl.className = '';
        badgeEl.innerHTML = '';
        if (badge) {
            badgeEl.className = `roller-badge ${badge.className}`;
            badgeEl.innerText = badge.text;
        }

        document.getElementById('last-roll-modal').hidden = false;
        if (lastRollTimer) clearTimeout(lastRollTimer);
        lastRollTimer = setTimeout(() => {
            document.getElementById('last-roll-modal').hidden = true;
            lastRollTimer = null;
        }, 10000);
    }

    function rollStat(index) {
        const stat = sheetData.stats[index];
        if (!stat) return;
        showRollResult(`${stat.label} próba`, buildD20Formula(stat.mod));
    }

    function rollSkill(index) {
        const skill = sheetData.skills[index];
        if (!skill) return;
        showRollResult(`${skill.n} próba`, buildD20Formula(calcSkillBonus(skill)));
    }

    function rollSave(index) {
        const save = sheetData.savingThrows[index];
        const stat = save ? sheetData.stats[save.statIndex] : null;
        if (!save || !stat) return;
        const total = parseSigned(stat.mod) + (save.p ? parseSigned(sheetData.prof) : 0);
        showRollResult(`${stat.label} mentődobás`, buildD20Formula(total));
    }

    function rollAttack(index, kind) {
        const attack = sheetData.attacks[index];
        if (!attack) return;
        if (kind === 'damage') {
            showRollResult(`${attack.n} sebzés`, attack.d);
            return;
        }
        showRollResult(`${attack.n} támadás`, buildD20Formula(attack.b));
    }

    function rollHitDice() {
        showRollResult('Harcerő kocka', getHitDiceFormula());
    }

    function render() {
        document.getElementById('c-name').innerText = sheetData.name;
        document.getElementById('c-meta').innerText = sheetData.raceClass;
        document.getElementById('c-ac').innerText = sheetData.ac;
        document.getElementById('c-init').innerText = sheetData.init;
        document.getElementById('c-prof').innerText = sheetData.prof;
        document.getElementById('hp-max').innerText = sheetData.hpMax;

        const statWrap = document.getElementById('stat-container');
        sheetData.stats.forEach((s, index) => {
            statWrap.innerHTML += `<div class="stat-box clickable-roll" role="button" tabindex="0" onclick="rollStat(${index})"><span class="stat-name">${s.label}</span><span class="stat-mod">${s.mod}</span><span class="stat-score">${s.val}</span></div>`;
        });

        const skillWrap = document.getElementById('skills-container');
        sheetData.skills.forEach((s, index) => {
            skillWrap.innerHTML += `<div class="skill-item clickable-roll" role="button" tabindex="0" onclick="rollSkill(${index})"><div class="skill-left"><div class="skill-rank ${skillRankClass(s.s)}">${skillRankLabel(s.s)}</div><span>${s.n} <span style="color:#aaa; font-size:0.65rem">(${s.a})</span></span></div><span style="color:var(--accent); font-family:var(--font-num)">${calcSkillBonus(s)}</span></div>`;
        });

        const saveWrap = document.getElementById('saves-container');
        const toSigned = n => (n >= 0 ? `+${n}` : `${n}`);
        sheetData.savingThrows.forEach((s, index) => {
            const stat = sheetData.stats[s.statIndex];
            const base = parseSigned((stat && stat.mod) || 0);
            const prof = s.p ? parseSigned(sheetData.prof) : 0;
            saveWrap.innerHTML += `<div class="save-item clickable-roll" role="button" tabindex="0" onclick="rollSave(${index})"><div style="display:flex; align-items:center;"><div class="prof-dot ${s.p ? 'filled' : ''}"></div><span>${stat.label}</span></div><span style="color:var(--accent); font-family:var(--font-num)">${toSigned(base + prof)}</span></div>`;
        });

        const atkWrap = document.querySelector('#atk-table tbody');
        sheetData.attacks.forEach((a, index) => {
            atkWrap.innerHTML += `<tr><td><button type="button" class="attack-roll-btn clickable-roll" onclick="rollAttack(${index}, 'attack')"><strong>${a.n}</strong></button></td><td style="font-family:var(--font-num); color:var(--accent)">${a.b}</td><td><button type="button" class="attack-dmg-btn clickable-roll" onclick="rollAttack(${index}, 'damage')">${a.d}</button></td></tr>`;
        });

        const resWrap = document.getElementById('slot-container');
        sheetData.resources.forEach((r, rIdx) => {
            let bubbles = '';
            for(let i=0; i<r.count; i++) bubbles += `<div class="bubble resource-bubble" data-r="${rIdx}" data-i="${i}" onclick="tgl(this)"></div>`;
            resWrap.innerHTML += `<div class="resource-item" data-short-rest="${Number.isFinite(r.shortRest) ? r.shortRest : 0}" data-count="${r.count}" style="display:flex; justify-content:space-between; margin-bottom:10px"><span>${r.label}</span><div style="display:flex">${bubbles}</div></div>`;
        });

        renderFeatures();
        renderHitDice();

        load();
    }

    function getHitDiceTotal() {
        return Number.isFinite(sheetData.hitDice?.total) ? sheetData.hitDice.total : 0;
    }

    function renderHitDice() {
        const row = document.getElementById('hit-dice-row');
        const total = getHitDiceTotal();
        hitDiceSpent = Array.from({ length: total }, (_, i) => hitDiceSpent[i] || false);

        const bubbles = [];
        for (let i = 0; i < total; i++) {
            bubbles.push('<div class="bubble hit-dice-bubble" data-hd="' + i + '" onclick="toggleHitDie(this, event)"></div>');
        }

        row.innerHTML = '<div class="hit-dice-trigger clickable-roll" role="button" tabindex="0" onclick="rollHitDice()"><span class="hit-dice-label">Harcerő kocka</span><span class="hit-dice-meta">' + total + (sheetData.hitDice?.die || '') + '</span></div><div class="hit-dice-track">' + bubbles.join('') + '</div>';
        updateHitDiceUI();
    }

    function toggleHitDie(el, event) {
        if (event) event.stopPropagation();
        const index = parseInt(el.dataset.hd, 10);
        hitDiceSpent[index] = !hitDiceSpent[index];
        updateHitDiceUI();
        save();
    }

    function updateHitDiceUI() {
        document.querySelectorAll('.hit-dice-bubble').forEach(b => {
            const index = parseInt(b.dataset.hd, 10);
            b.classList.toggle('checked', !!hitDiceSpent[index]);
        });
    }

    function renderFeatures() {
        const featWrap = document.getElementById('feat-list');
        featWrap.innerHTML = '';
        featureCounters = [];

        const features = Array.isArray(sheetData.features)
            ? sheetData.features
            : [{ title: 'Tulajdonságok', description: String(sheetData.features || '') }];

        features.forEach((feature, fIdx) => {
            const count = Number.isFinite(feature.count) ? feature.count : 0;
            const counterMarkup = count > 0 ? renderFeatureCounter(fIdx, count) : '';

            featWrap.innerHTML += `
                <div class="feature-item" data-short-rest="${Number.isFinite(feature.shortRest) ? feature.shortRest : 0}" data-count="${count}">
                    <div class="feature-title">${feature.title || `Feature ${fIdx + 1}`}</div>
                    <div class="feature-desc">${feature.description || ''}</div>
                    ${counterMarkup}
                </div>
            `;

            if (count > 0 && !featureCounters[fIdx]) {
                featureCounters[fIdx] = Array.from({ length: count }, () => false);
            }
        });
    }

    function renderFeatureCounter(featureIndex, count) {
        const bubbles = [];
        for (let i = 0; i < count; i++) {
            bubbles.push('<div class="bubble feature-bubble" data-f="' + featureIndex + '" data-i="' + i + '" onclick="tglFeature(this)"></div>');
        }
        return '<div class="feature-counter"><span class="feature-counter-label">Számláló</span><div style="display:flex">' + bubbles.join('') + '</div></div>';
    }


    function refillCounterRow(rowEl, amount, bubbleSelector) {
        const checked = Array.from(rowEl.querySelectorAll(bubbleSelector + '.checked'));
        const refill = Math.min(amount, checked.length);
        for (let i = 0; i < refill; i++) {
            checked[checked.length - 1 - i].classList.remove('checked');
        }
    }

    function adjustHP(type) {
        let curr = normalizeCurrentHP(document.getElementById('hp-curr'));
        const modInput = document.getElementById('hp-mod');
        const mod = normalizeHPMod(modInput);

        if (type === 'heal') {
            curr = Math.min(sheetData.hpMax, curr + mod);
        } else if (type === 'dmg') {
            if (tempHP > 0) {
                if (mod <= tempHP) {
                    tempHP -= mod;
                } else {
                    const remainder = mod - tempHP;
                    tempHP = 0;
                    curr -= remainder;
                }
            } else { curr -= mod; }
        } else if (type === 'temp') {
            tempHP = mod;
        }

        curr = Math.max(0, curr);
        document.getElementById('hp-curr').value = curr;
        document.getElementById('hp-mod').value = 1;
        updateTempUI();
        updateDeathSaveUI();
        save();
    }

    function normalizeCurrentHP(input) {
        const el = typeof input === 'string' ? document.getElementById(input) : input;
        let value = parseInt(el.value, 10);
        if (!Number.isFinite(value) || value < 0) value = 0;
        el.value = value;
        return value;
    }

    function normalizeHPMod(input) {
        const el = typeof input === 'string' ? document.getElementById(input) : input;
        let value = parseInt(el.value, 10);
        if (!Number.isFinite(value) || value < 1) value = 1;
        el.value = value;
        return value;
    }

    function stepHPMod(delta) {
        const el = document.getElementById('hp-mod');
        const value = normalizeHPMod(el) + delta;
        el.value = Math.max(1, value);
        el.focus();
    }

    function toggleDeathSave(kind, index) {
        deathSaves[kind][index] = !deathSaves[kind][index];
        updateDeathSaveUI();
    }

    function resetDeathSaves() {
        deathSaves = { success: [false, false, false], fail: [false, false, false] };
    }

    function updateDeathSaveUI() {
        const block = document.getElementById('death-save-block');
        const curr = normalizeCurrentHP(document.getElementById('hp-curr'));
        const isDown = curr <= 0;

        block.hidden = !isDown;
        if (!isDown) {
            resetDeathSaves();
        }

        document.querySelectorAll('.death-save-dot').forEach(dot => {
            const kind = dot.dataset.kind;
            const index = parseInt(dot.dataset.index, 10);
            dot.classList.toggle('filled', isDown && deathSaves[kind][index]);
        });
    }

    function updateTempUI() {
        const badge = document.getElementById('hp-temp-badge');
        if (tempHP > 0) {
            badge.innerText = `+${tempHP} Temp`;
            badge.classList.add('active');
        } else {
            badge.classList.remove('active');
        }
    }

    function tgl(el) { el.classList.toggle('checked'); save(); }
    function tglFeature(el) {
        const f = parseInt(el.dataset.f, 10);
        const i = parseInt(el.dataset.i, 10);
        featureCounters[f][i] = !featureCounters[f][i];
        el.classList.toggle('checked');
        save();
    }
    function save() {
        const checked = [];
        document.querySelectorAll('.resource-bubble.checked').forEach(b => checked.push({r: b.dataset.r, i: b.dataset.i}));
        const featureChecked = [];
        document.querySelectorAll('.feature-bubble.checked').forEach(b => featureChecked.push({ f: b.dataset.f, i: b.dataset.i }));
        localStorage.setItem(KEY, JSON.stringify({ hp: normalizeCurrentHP(document.getElementById('hp-curr')), thp: tempHP, checked, featureChecked, hitDiceSpent }));
    }

    function load() {
        const saved = localStorage.getItem(KEY);
        if(!saved) { document.getElementById('hp-curr').value = sheetData.hpMax; updateDeathSaveUI(); return; }
        const state = JSON.parse(saved);
        document.getElementById('hp-curr').value = Math.max(0, state.hp ?? sheetData.hpMax);
        tempHP = state.thp || 0;
        updateTempUI();
        (state.checked || []).forEach(s => {
            const el = document.querySelector(`.resource-bubble[data-r="${s.r}"][data-i="${s.i}"]`);
            if(el) el.classList.add('checked');
        });
        (state.featureChecked || []).forEach(s => {
            const el = document.querySelector(`.feature-bubble[data-f="${s.f}"][data-i="${s.i}"]`);
            if (el) {
                el.classList.add('checked');
                if (featureCounters[s.f]) featureCounters[s.f][s.i] = true;
            }
        });
        hitDiceSpent = Array.from({ length: getHitDiceTotal() }, (_, i) => !!(state.hitDiceSpent || [])[i]);
        updateHitDiceUI();
        updateDeathSaveUI();
    }

    function shortRest() {
        document.querySelectorAll('.resource-item').forEach(row => {
            const refill = parseInt(row.dataset.shortRest, 10) || 0;
            if (refill > 0) refillCounterRow(row, refill, '.resource-bubble');
        });
        document.querySelectorAll('.feature-item').forEach(row => {
            const refill = parseInt(row.dataset.shortRest, 10) || 0;
            const count = parseInt(row.dataset.count, 10) || 0;
            if (refill > 0 && count > 0) refillCounterRow(row, refill, '.feature-bubble');
        });
        save();
    }

    function longRest() {
        if(confirm("Megerősíted a hosszú pihenőt?")) {
            document.getElementById('hp-curr').value = sheetData.hpMax;
            tempHP = 0;
            resetDeathSaves();
            hitDiceSpent = Array.from({ length: getHitDiceTotal() }, () => false);
            updateTempUI();
            document.querySelectorAll('.resource-bubble, .feature-bubble').forEach(b => b.classList.remove('checked'));
            featureCounters = featureCounters.map(arr => arr.map(() => false));
            updateHitDiceUI();
            updateDeathSaveUI();
            save();
        }
    }

    window.onload = render;
</script>
</body>
</html>
